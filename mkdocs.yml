site_name: The Ultra-Scale Playbook
site_description: The ultimate guide to training LLM on large GPU Clusters
site_url: https://lzx1413.github.io/ultra-scale-book/
repo_url: https://github.com/lzx1413/ultra-scale-book
repo_name: lzx1413/ultra-scale-book

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - "1. High-Level Overview": 01_high_level_overview.md
  - "2. First Steps: Training on One GPU": 02_first_steps_training_on_one_gpu.md
  - "3. Data Parallelism": 03_data_parallelism.md
  - "4. Tensor Parallelism": 04_tensor_parallelism.md
  - "5. Context Parallelism": 05_context_parallelism.md
  - "6. Pipeline Parallelism": 06_pipeline_parallelism.md
  - "7. Expert Parallelism": 07_expert_parallelism.md
  - "8. 5D Parallelism in a Nutshell": 08_5d_parallelism_in_a_nutshell.md
  - "9. Finding the Best Training Configuration": 09_finding_best_training_configuration.md
  - "10. Diving into the GPUs": 10_diving_into_gpus.md
  - "11. Conclusion": 11_conclusion.md
  - "12. References": 12_references.md
  - "13. Appendix": 13_appendix.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_tabs: true
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lzx1413/ultra-scale-book